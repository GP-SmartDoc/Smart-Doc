version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - shared_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - RETRIEVAL_SERVICE_URL=http://retrieval-api:8000
    env_file:
      - .env
    depends_on:
      - retrieval-api

  retrieval-api:
    build:
      context: ./retrieval_service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - ./retrieval_service:/app
      - shared_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_HOME=/app/models/.cache
    depends_on:
      - chromadb
      - redis

  retrieval-worker:
    build:
      context: ./retrieval_service
      dockerfile: Dockerfile
    restart: always
    command: ["sh", "-c", "PYTHONPATH=./src celery -A retrieval_service.worker.celery_app worker -c 1 --loglevel=info"]
    volumes:
      - ./retrieval_service:/app
      - shared_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_HOME=/app/models/.cache
    depends_on:
      - chromadb
      - redis

  redis:
    image: redis:7-alpine

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api

volumes:
  shared_data:
  chroma_data:
